name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries
        run: |
          mkdir -p bin
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/bananascaler-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/bananascaler-linux-arm64 .
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bin/bananascaler-windows-amd64.exe .
          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bin/bananascaler-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bin/bananascaler-darwin-arm64 .

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/bananascaler-linux-amd64
            bin/bananascaler-linux-arm64
            bin/bananascaler-windows-amd64.exe
            bin/bananascaler-darwin-amd64
            bin/bananascaler-darwin-arm64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
